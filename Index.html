<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ByteBeat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 60px;
    }

    .icon {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 15px;
      border: 2px solid #555;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      border: 2px solid #555;
      background: #111;
      transition: 0.3s;
    }

    .btn:hover {
      background: #222;
      border-color: #aaa;
    }

    .box {
      width: 80%;
      max-width: 500px;
      background: #1a1a1a;
      border: 2px solid #888;
      border-radius: 12px;
      padding: 20px;
      color: #ddd;
      text-align: left;
    }

    .box h2 {
      margin-top: 0;
      color: white;
    }

    .info {
      line-height: 1.6;
    }
  </style>
</head>

<body>
  
  <img class="icon" src="Archivos/Imagenes/icono.png" alt="Icono ByteBeat">

  <h1>ByteBeat</h1>

  <div class="buttons">
    <a class="btn" href="Archivos/APK/ByteBeat" download>Instalar</a>
    <a class="btn" href="https://dollchan.net/bytebeat" target="_blank">Online</a>
  </div>

  <div class="box">
    <h2>Información</h2>
    <div class="info">
      <p><strong>¿Qué es ByteBeat?</strong><br>
      ByteBeat es una herramienta para generar sonidos y música a partir de Programacion y Matematicas.</p>

      <p><strong>Autor:</strong> max_xd811</p>
      <p><strong>Versión:</strong> 1.0</p>
    </div>
  </div>

</body>
</html>
